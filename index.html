
<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>ADGU - Gestão Ministerial</title>
    
    <meta name="theme-color" content="#ffffff" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <link rel="manifest" href="manifest.json" />

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
      :root {
        --safe-area-inset-bottom: env(safe-area-inset-bottom);
        --safe-area-inset-top: env(safe-area-inset-top);
      }
      body {
        font-family: 'Plus Jakarta Sans', sans-serif;
        background-color: #fdfdff;
        color: #0f172a;
        -webkit-font-smoothing: antialiased;
        margin: 0;
        min-height: 100vh;
        width: 100vw;
        overflow-x: hidden;
      }
      #root {
        min-height: 100vh;
        display: flex;
        flex-direction: column;
      }
      .mesh-bg {
        background-color: #ffffff;
        background-image: 
          radial-gradient(at 0% 0%, hsla(221,100%,96%,1) 0, transparent 50%), 
          radial-gradient(at 50% 0%, hsla(220,100%,94%,1) 0, transparent 50%), 
          radial-gradient(at 100% 0%, hsla(221,100%,96%,1) 0, transparent 50%);
      }
      .glass {
        background: rgba(255, 255, 255, 0.85);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border: 1px solid rgba(255, 255, 255, 0.4);
      }
      .active-scale:active {
        transform: scale(0.95);
      }
      ::-webkit-scrollbar {
        width: 4px;
      }
      ::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 10px;
      }
      .shadow-soft {
        box-shadow: 0 10px 30px -10px rgba(0,0,0,0.04);
      }
      .shadow-3xl {
        box-shadow: 0 35px 60px -15px rgba(0, 0, 0, 0.1);
      }
      input::placeholder {
        color: #94a3b8;
        font-weight: 500;
      }
      /* Prevenção de zoom automático em inputs no iOS */
      @media screen and (max-width: 768px) {
        input, select, textarea {
          font-size: 16px !important;
        }
      }
    </style>
  <script type="importmap">
{
  "imports": {

    "react": "https://esm.sh/react@^19.2.4",
    "recharts": "https://esm.sh/recharts@^3.7.0",
    "lucide-react": "https://esm.sh/lucide-react@^0.563.0",
    "react-dom/": "https://esm.sh/react-dom@^19.2.4/",
    "jspdf": "https://esm.sh/jspdf@^2.5.1",
    "jspdf-autotable": "https://esm.sh/jspdf-autotable@^3.8.2",
    "@supabase/supabase-js": "https://esm.sh/@supabase/supabase-js@2.39.7",
    "@google/genai": "https://esm.sh/@google/genai@^1.38.0"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>
  <body class="mesh-bg">
    <div id="root"></div>

</body>
</html>
